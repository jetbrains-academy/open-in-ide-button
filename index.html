<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Course in IDE</title>
    <link rel="icon" href="favicon.ico">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Open Toolbox Course Link</h1>

        <form id="courseForm">
            <div class="form-group">
                <label for="marketplaceId">Marketplace ID:</label>
                <input
                    type="number"
                    id="marketplaceId"
                    name="marketplaceId"
                    placeholder="Enter course marketplace ID"
                    value="16630"
                    required
                >
            </div>

            <div class="form-group">
                <label for="programmingLanguage">Programming Language:</label>
                <select id="programmingLanguage" name="programmingLanguage" required>
                    <option value="Python" selected>Python</option>
                    <option value="Kotlin">Kotlin</option>
                    <option value="JavaScript">JavaScript</option>
                    <option value="Java">Java</option>
                    <option value="Go">Go</option>
                    <option value="Scala">Scala</option>
                    <option value="Objective-C">Objective-C</option>
                    <option value="Rust">Rust</option>
                    <option value="C++">C++</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <button type="submit" class="btn-generate">Open in IDE</button>
        </form>

    </div>

    <div id="modal" class="modal hidden">
        <div class="modal-overlay"></div>
        <div class="modal-content">
            <div id="questionView">
                <h3>Did the course open?</h3>
                <div class="modal-buttons">
                    <button id="yesBtn" class="btn-modal">Yes</button>
                    <button id="noBtn" class="btn-modal btn-modal-secondary">No</button>
                </div>
            </div>
            <div id="helpView" class="hidden">
                <p class="help-text">
                    Download and install Toolbox and try again
                </p>
                <a href="https://www.jetbrains.com/toolbox-app/" target="_blank" class="toolbox-link">
                    Download JetBrains Toolbox
                </a>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
